[general]
import = ["./themes/catppuccin-mocha.toml"]

[cursor.style]
blinking = "On"
shape = "Underline"

[env]
TERM = "alacritty"

[font]
size = 10 # Default: 11.25

[font.normal]
family = "FiraCode Nerd Font Mono"

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[window]
decorations = "None"
dynamic_padding = false
dynamic_title = true      # Default: true
resize_increments = true  # Works on macOS/X11
startup_mode = "Windowed"
